services:
  api1:
    platform: linux/amd64
    image: rmoraes4/rinha-2026-python1@sha256:c151caa6ca6b99b303ab03a064151e9380595ecfae0981a92eb1963a383010bd
    environment:
      - PORT=8000
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "170M"

  api2:
    platform: linux/amd64
    image: rmoraes4/rinha-2026-python1@sha256:c151caa6ca6b99b303ab03a064151e9380595ecfae0981a92eb1963a383010bd
    environment:
      - PORT=8000
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "170M"

  lb:
    platform: linux/amd64
    image: nginx:alpine
    depends_on:
      - api1
      - api2
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: "20M"

networks:
  rinha:
    driver: bridge
