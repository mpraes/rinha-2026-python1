services:
  api1: &api
    image: rinha-fraud-2026:latest
    build: .
    environment:
      - PORT=8000
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: "150M"

  api2:
    <<: *api
    build: !reset null

  lb:
    image: nginx:alpine
    restart: always
    depends_on:
      - api1
      - api2
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "50M"
