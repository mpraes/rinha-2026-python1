services:
  api1:
    platform: linux/amd64
    image: rmoraes4/rinha-2026-python1@sha256:0a8538e8c9b39074422e6b7de591d9b4d91b6c67a2d00fedbafc1ba2ce677cc7
    environment:
      - PORT=8000
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "165M"

  api2:
    platform: linux/amd64
    image: rmoraes4/rinha-2026-python1@sha256:0a8538e8c9b39074422e6b7de591d9b4d91b6c67a2d00fedbafc1ba2ce677cc7
    environment:
      - PORT=8000
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "165M"

  lb:
    platform: linux/amd64
    image: nginx:alpine
    depends_on:
      - api1
      - api2
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: "20M"

networks:
  rinha:
    driver: bridge
