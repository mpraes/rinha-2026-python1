events {
    worker_connections 65535;
}

http {
    access_log off;
    error_log /dev/null crit;

    upstream api {
        server api1:8000;
        server api2:8000;
    }

    server {
        listen 9999;

        location / {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
        }
    }
}
